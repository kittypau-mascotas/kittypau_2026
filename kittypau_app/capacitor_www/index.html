<!doctype html>
<html lang="es">

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>KittyPau</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f6dbd6;
        color: #1f2937;
        display: grid;
        place-items: center;
        min-height: 100vh;
        text-align: center;

        padding: 24px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.6rem;
      }
      p {
        margin: 0;
        line-height: 1.4;
      }

  <body>
    <main class="card">
      <h1>KittyPau</h1>
      <p>Conectando con el servicio en línea...</p>
