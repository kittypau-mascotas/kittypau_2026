[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2
framework = arduino
lib_deps =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^6.19.4
    bogde/HX711 @ ^0.7.5
    claws/BH1750 @ ^1.3.0
    adafruit/Adafruit AHTX0 @ ^2.0.5
    adafruit/Adafruit Unified Sensor @ ^1.1.14
monitor_speed = 115200
board_build.filesystem = littlefs
upload_port = COM10

; === Calibración HX711 (solo para calibrar, no para producción) ===
[env:calibration]
platform = espressif8266
board = nodemcuv2
framework = arduino
lib_deps =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^6.19.4
    bogde/HX711 @ ^0.7.5
    claws/BH1750 @ ^1.3.0
    adafruit/Adafruit AHTX0 @ ^2.0.5
    adafruit/Adafruit Unified Sensor @ ^1.1.14
monitor_speed = 115200
board_build.filesystem = littlefs
build_flags = -D CALIBRATION_MODE
upload_port = COM10

; === OTA (Over-The-Air) ===
; Mismo firmware, pero sube por WiFi en vez de USB
; Cambiar upload_port a la IP del dispositivo destino
[env:ota]
platform = espressif8266
board = nodemcuv2
framework = arduino
lib_deps =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^6.19.4
    bogde/HX711 @ ^0.7.5
    claws/BH1750 @ ^1.3.0
    adafruit/Adafruit AHTX0 @ ^2.0.5
    adafruit/Adafruit Unified Sensor @ ^1.1.14
monitor_speed = 115200
board_build.filesystem = littlefs
upload_protocol = espota
upload_port = 192.168.100.106

; === OTA dedicado para KPCL0035 ===
; Usa DEVICE_ID por build flag para no editar config.h en cada cambio de placa.
; Cambia upload_port a la IP real actual del KPCL0035 antes de subir.
[env:ota_kpcl0035]
platform = espressif8266
board = nodemcuv2
framework = arduino
lib_deps =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^6.19.4
    bogde/HX711 @ ^0.7.5
    claws/BH1750 @ ^1.3.0
    adafruit/DHT sensor library @ ^1.4.2
    adafruit/Adafruit Unified Sensor @ ^1.1.14
build_flags = -D DEVICE_ID=\"KPCL0035\" -D USE_DHT11
monitor_speed = 115200
board_build.filesystem = littlefs
upload_protocol = espota
upload_port = 192.168.100.95
